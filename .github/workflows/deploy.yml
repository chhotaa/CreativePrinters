name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  ftp-deploy:
    name: Sync files to Hostinger via FTP
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # Change this to wherever your account's FTP root actually lands
          # (often "/" or "/public_html/" on Hostinger - confirm in hPanel).
          server-dir: /public_html/
          local-dir: ./
          dangerous-clean-slate: false
          # Renamed to force a fresh full sync: the old tracker file
          # (.ftp-deploy-sync-state.json) apparently recorded some files as
          # deployed when they weren't, causing future runs to skip
          # re-uploading them. A new state file name means this run has no
          # prior record to compare against, so it re-verifies everything.
          # It's safe to leave the old tracker file orphaned on the server.
          state-name: .ftp-deploy-sync-state-v2.json
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/README.md
            **/*.sql
            **/migrations/**
            **/includes/db.php
